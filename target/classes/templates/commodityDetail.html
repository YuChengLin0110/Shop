<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>item</title>
    <meta name="viewport"
          content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/main.css}" href="css/main.css" />
</head>
<body class="is-preload">

<!-- Wrapper -->
<div id="wrapper">

    <!-- Main -->
    <div id="main">
        <div class="inner">

            <!-- Header -->

            <header id="header">
                <strong></strong>
                <marquee direction="left" height="30" scrollamount="5"
                         style="color: red;"></marquee>
            </header>
            <br> <br>
            <h2 th:text="${commodity.name}">Name</h2>

            <p style="font-size: 18px;">
                <span class="image left"><img th:src="@{${commodity.image}}" alt="" /></span>縮圖:
                <a th:text="${commodity.category}"></a>
                <br>單價:<a th:text="${commodity.price}"></a>
                <br>數量:<a th:text="${commodity.quantity}"></a>
                <br>詳細資訊:<a th:text="${commodity.detail}"></a>
            </p>


        </div>
    </div>

    <!-- Sidebar -->
    <div id="sidebar">
        <div class="inner">

            <!-- Search -->
            <section>
                <header>
                    <h2>Shop</h2>
                </header>
            </section>

            <!-- Menu -->
            <nav id="menu">
                <header class="major">
                    <h2>Menu</h2>
                </header>
                <ul>
                    <li><a href="/">回首頁</a></li>
                    <li><a href="commodity">瀏覽商品</a></li>
					<li th:if="${isLogin == true}"><a href="member">會員管理</a></li>
                    <li th:if="${isLogin == true}"><a href="logout">登出</a></li>
                    <li th:if="${isLogin == false}"><a href="login">會員登入</a></li>
					<li th:if="${isLogin == false}"><a href="register">會員註冊</a></li>
                </ul>
            </nav>

            <!-- Footer -->
            <footer id="footer">
                <div>
                    </div>
                <p class="copyright">&copy; Untitled. All rights reserved.</p>
            </footer>

        </div>
    </div>

</div>

<!-- Scripts -->
<script src="/js/jquery.min.js"></script>
<script src="/js/browser.min.js"></script>
<script src="/js/breakpoints.min.js"></script>
<script src="/js/util.js"></script>
<script src="/js/main.js"></script>

</body>
</html>
